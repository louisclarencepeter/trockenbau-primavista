<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8" />

  <!-- PrimaVista icons -->
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f7f4ed" />
  <meta
    name="description"
    content="Trockenbau Prima Vista bietet professionelle Lösungen für Trockenbau, Sanierung, Renovierung, Fenster und Innenausbau."
  />

  <title>Trockenbau Prima Vista | Trockenbau, Sanierung, Fenster und Innenausbau</title>

</head>

<body>

  <!-- Netlify Forms: hidden HTML form for bot detection -->
  <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="contact" />
    <input type="text" name="bot-field" />
    <input type="text" name="subject" />
    <input type="text" name="submission_type" />
    <input type="text" name="confirmation_requested" />
    <input type="text" name="confirmation_request_id" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <textarea name="message"></textarea>
  </form>

  <form name="calculator" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="calculator" />
    <input type="text" name="bot-field" />
    <input type="text" name="subject" />
    <input type="text" name="submission_type" />
    <input type="text" name="confirmation_requested" />
    <input type="text" name="confirmation_request_id" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="text" name="package" />
    <input type="text" name="room_size" />
    <input type="text" name="quantity" />
    <input type="text" name="add_ons" />
    <input type="text" name="material_net" />
    <input type="text" name="montage_net" />
    <input type="text" name="subtotal_net" />
    <input type="text" name="vat" />
    <input type="text" name="summary" />
    <input type="text" name="total" />
    <textarea name="message"></textarea>
  </form>

  <form name="anfrage" method="POST" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="hidden" name="form-name" value="anfrage" />
    <input type="text" name="bot-field" />
    <input type="text" name="subject" />
    <input type="text" name="submission_type" />
    <input type="text" name="confirmation_requested" />
    <input type="text" name="confirmation_request_id" />
    <input type="text" name="service" />
    <input type="text" name="add_ons" />
    <input type="text" name="room_size" />
    <input type="text" name="zeitplan" />
    <input type="text" name="summary" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <input type="text" name="plz" />
    <textarea name="message"></textarea>
  </form>

  <div id="root"></div>

  <script type="module" src="/src/main.jsx"></script>

</body>

</html>
